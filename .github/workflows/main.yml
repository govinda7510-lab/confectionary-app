name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Extract ZIP & Build APK
        run: |
          # 1. Unzip the uploaded archive into a new folder
          unzip *.zip -d android_src
          
          # 2. Go directly into that folder
          cd android_src
          
          # 3. Strip out the duplicate Kotlin plugin that crashes AGP 9
          find . -name "*.gradle*" -type f -exec sed -i '/org.jetbrains.kotlin.android/d' {} +
          
          # 4. Build the APK
          gradle assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-offline-apk
          path: '**/*/app-debug.apk'
